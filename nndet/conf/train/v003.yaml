# @package __global__
# V003: PatchCls + BI-RADS classifier (fine-tune from pretrained V001)
defaults:
  - augmentation: base_more

module: RetinaUNetV003
predictor: BoxPredictorSelective

plan: D3V001_3d # plan used for training
planner: D3V001 # planner used for preprocessing

augment_cfg:
  augmentation: ${augmentation}
  num_train_batches_per_epoch: ${trainer_cfg.num_train_batches_per_epoch}
  num_val_batches_per_epoch: ${trainer_cfg.num_val_batches_per_epoch}

  dataloader: "DataLoader{}DOffset"
  oversample_foreground_percent: 0.5
  dataloader_kwargs: {}

  num_threads: ${oc.env:det_num_threads, "12"}
  num_cached_per_thread: 2
  multiprocessing: True

trainer_cfg:
  gpus: 1
  accelerator:
  precision: 16
  amp_backend: native
  amp_level: O1
  deterministic: False
  benchmark: False

  monitor_key: "mAP_IoU_0.10_0.50_0.05_MaxDet_100"
  monitor_mode: "max"

  max_num_epochs: 50
  num_train_batches_per_epoch: 2500
  num_val_batches_per_epoch: 100

  initial_lr: 0.01
  sgd_momentum: 0.9
  sgd_nesterov: True
  weight_decay: 3.e-5

  warm_iterations: 4000
  warm_lr: 1.e-6

  poly_gamma: 0.9

  swa_epochs: 10

model_cfg:
  # Path to pretrained V001 checkpoint for fine-tuning (set to null to train from scratch)
  pretrained_weights: null

  encoder_kwargs: {}
  decoder_kwargs:
    min_out_channels: 8
    upsampling_mode: "transpose"

    num_lateral: 1
    norm_lateral: False
    activation_lateral: False

    num_out: 1
    norm_out: False
    activation_out: False

  head_kwargs: {}

  head_classifier_kwargs: # BCE binary detection (same as V001)
    num_convs: 1
    norm_channels_per_group: 16
    norm_affine: True
    reduction: "mean"
    loss_weight: 1.
    prior_prob: 0.01

  head_regressor_kwargs:
    num_convs: 1
    norm_channels_per_group: 16
    norm_affine: True
    reduction: "sum"
    loss_weight: 1.
    learn_scale: True

  head_sampler_kwargs:
    batch_size_per_image: 32
    positive_fraction: 0.33
    pool_size: 20
    min_neg: 1

  segmenter_kwargs:
    dice_kwargs:
      batch_dice: True

  patch_classifier_kwargs: # Keep PatchClassifier from V001
    hidden_dim: 128
    dropout: 0.3
    loss_weight: 1.0

  birads_classifier_kwargs: # BI-RADS classification head (RoI-based)
    num_classes: 3       # BIRADS 2/3/4
    roi_size: 2          # adaptive pool size per FPN level per box
    hidden_dim: 128
    dropout: 0.3
    loss_weight: 1.0

  matcher_kwargs:
    num_candidates: 4
    center_in_gt: False

  plan_arch_overwrites: {}
  plan_anchors_overwrites: {}
